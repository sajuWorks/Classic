<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Classic - Camera Access</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; 
    
        body {
            background: yellow;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }
        #topImage {
            width: 100px;
            max-width: 40%;
            margin-bottom: 20px;
        }
        #welcomeScreen {
            border: 3px solid black;
            padding: 36px 40px;
            max-width: 520px;
            width: 90%;
            background: yellow;
            font-size: 1.1rem;
            line-height: 1.9;
            color: black;
        }
        #welcomeScreen strong { font-weight: 900; }
        #okayInput {
            width: 100%;
            margin-top: 20px;
            padding: 10px 14px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            border: 2px solid black;
            background: yellow;
            outline: none;
        }
        #statusMsg { margin-top: 12px; font-size: 0.9rem; min-height: 20px; }
    </style>
</head>
<body>
    <img src="IMG_0467-removebg-preview.png" alt="Image" id="topImage">

    <div id="welcomeScreen">
        <p>
            Welcome to Classic.<br>
            The trainer needs access to your camera<br>
            and microphone for analyzing your bodylanguage.<br>
            Turn up the volume<br>
        </p>
        <input id="okayInput" type="text" placeholder='Type "OKAY" to continue' autocomplete="off">
        <p id="statusMsg"></p>
        <p id="output" style="margin-top:8px; font-size:0.9rem;"></p>
    </div>

    <div class="modal fade" id="spotifyModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-footer">
                </div>
            </div>
        </div>
    </div>

    <script>
        function saveSpotifyId() {
            const id = document.getElementById("spotifyId").value;
            if (id.trim() === "") { alert("Please enter a Spotify ID"); return; }
            localStorage.setItem("spotifyId", id);
            document.getElementById("output").textContent = "Spotify ID: " + id;
        }

        window.addEventListener("DOMContentLoaded", function() {

            document.getElementById("okayInput").addEventListener("input", async function() {
                if (this.value.trim().toUpperCase() === "OKAY") {
                    const status = document.getElementById("statusMsg");
                    status.textContent = "Requesting access...";
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                        stream.getTracks().forEach(track => track.stop());
                        status.textContent = "✅ Access granted! Redirecting...";
                        sessionStorage.setItem("okayDone", "true");
                        setTimeout(() => { window.location.href = "index.html"; }, 800);
                    } catch (err) {
                        this.value = "";
                        if (err.name === "NotAllowedError") {
                            status.textContent = "❌ Permission denied. Please allow access in browser settings.";
                        } else {
                            status.textContent = "❌ Error: " + err.message;
                        }
                    }
                }
            });
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
