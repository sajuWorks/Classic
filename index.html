<!DOCTYPE html>
<html lang="en">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<head>
    <meta charset="UTF-8">
    <title>Classic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#spotifyModal">
    Connect Spotify
    </button>

<div class="modal fade" id="spotifyModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Enter Spotify ID</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="text" id="spotifyId" class="form-control" placeholder="Your Spotify ID">
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closePopup()" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-success" onclick="saveSpotifyId()" data-bs-dismiss="modal">Save</button>
      </div>
      <script src="classic.js"></script>
    </div>
  </div>
</div>

<p id="output"></p>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
