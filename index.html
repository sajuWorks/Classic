<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Classic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        #videoElement {
            width: 100%;
            max-width: 640px;
            display: block;
            margin: 20px auto;
            border-radius: 8px;
        }
        #nowPlaying {
            font-weight: bold;
            font-size: 1.1rem;
            margin: 12px auto;
            max-width: 640px;
            color: #1B5E20;
        }
        #ytPlayer {
            width: 100%;
            max-width: 640px;
            margin: 0 auto 20px;
            display: block;
            border-radius: 8px;
            overflow: hidden;
        }
        #songList {
            max-width: 640px;
            margin: 0 auto 20px;
        }
        .song-item {
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 8px;
            opacity: 0.6;
        }
        .song-item.active {
            opacity: 1;
            border-left: 4px solid #1B5E20;
        }
        .song-title { font-weight: 600; }
        .song-why { font-size: 0.85rem; color: #333; margin-top: 2px; }
    </style>
</head>
<body>
    <div style="text-align:center; margin-top: 20px;">
        <video id="videoElement" autoplay playsinline muted></video>
        <p id="nowPlaying">Waiting for vibe analysis...</p>
        <div id="ytPlayer"></div>
        <div id="songList"></div>
    </div>
 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="classic.js" defer></script>
    <script defer>
        window.addEventListener("DOMContentLoaded", function() {
            if (!sessionStorage.getItem("okayDone")) {
                window.location.href = "camera.html";
                return;
            }
            startCamera();
        });
    </script>
</body>
</html>
